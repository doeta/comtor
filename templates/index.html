<!doctype html>
<html>
  <head>
    <title>COMTOR</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div
      class="container"
      style="animation: fadeInUp 0.6s ease-out forwards; opacity: 0"
    >
      <h1
        class="stagger-1"
        style="
          animation: fadeInUp 0.6s ease-out forwards;
          animation-delay: 0.1s;
          opacity: 0;
        "
      >
        Commit Generator
      </h1>

      {% with messages = get_flashed_messages() %} {% if messages %}
      <ul
        class="flashes stagger-2"
        style="
          animation: fadeInUp 0.6s ease-out forwards;
          animation-delay: 0.2s;
          opacity: 0;
        "
      >
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %} {% endwith %}

      <p
        class="stagger-2"
        style="
          color: #64748b;
          margin-bottom: 2rem;
          animation: fadeInUp 0.6s ease-out forwards;
          animation-delay: 0.3s;
          opacity: 0;
        "
      >
        Automate your GitHub contribution graph securely.
      </p>

      <a href="/login" style="text-decoration: none">
        <button
          class="stagger-3"
          style="
            animation: fadeInUp 0.6s ease-out forwards;
            animation-delay: 0.4s;
            opacity: 0;
          "
        >
          Login with GitHub
        </button>
      </a>
    </div>
  </body>
</html>
