<!doctype html>
<html>
  <head>
    <title>Commit Generator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      {% with messages = get_flashed_messages() %} {% if messages %}
      <ul class="flashes">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %} {% endwith %}
      <h1>Commit Generator</h1>
      <a href="/login">
        <button>Login with GitHub</button>
      </a>
    </div>
  </body>
</html>
